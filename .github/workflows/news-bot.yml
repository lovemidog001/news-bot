name: AI News Bot

on:
  schedule:
    # 台灣時間 12:00 和 23:00（UTC+8，GitHub 用 UTC）
    - cron: '5 4,12,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run News Generator
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit JSON Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add news/
          git commit -m "Auto update news $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push

      - name: Clear Serv00 Cache
        run: |
          curl -s "https://ailoom.ccwu.cc/cache_clear.php?token=${{ secrets.CACHE_TOKEN }}" || echo "Cache clear failed (non-critical)"
